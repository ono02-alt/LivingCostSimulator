// ============================================================
// ★ Gemini API 無料枠管理・有料化防止システム
//   - Gemini 2.5 Flash: 無料枠 1,500 req/日（クレカ不要）
//   - localStorageで当日使用回数を管理
//   - 上限到達 → API呼び出し停止、ローカルデータで継続動作
//   - 課金トリガー（billing有効化）は一切行わない設計
// ============================================================
const GEMINI_DAILY_LIMIT = 30; // 1,500req/日の安全マージン（2%以内）
const GEMINI_MODEL = "gemini-2.5-flash-lite"; // 無料枠・安定版（1,500req/日）

function getApiUsageToday() {
  const today = new Date().toISOString().slice(0,10);
  try {
    const stored = JSON.parse(localStorage.getItem("gemini_usage") || "{}");
    if (stored.date !== today) return 0;
    return stored.count || 0;
  } catch { return 0; }
}
function incrementApiUsage() {
  const today = new Date().toISOString().slice(0,10);
  try {
    const stored = JSON.parse(localStorage.getItem("gemini_usage") || "{}");
    const count = (stored.date === today ? (stored.count || 0) : 0) + 1;
    localStorage.setItem("gemini_usage", JSON.stringify({ date: today, count }));
    return count;
  } catch { return 999; }
}
function canUseAPI(apiKey) {
  if (!apiKey || apiKey.trim() === "") return false;
  return getApiUsageToday() < GEMINI_DAILY_LIMIT;
}

function calcWater(cityId,m3){
  const r=WATER_DB[cityId]||WATER_DB._default;
  let w=r.wb,prev=0;
  for(const t of r.wr){
    if(m3<=prev)break;
    const used=Math.min(m3,t.l)-prev;
    w+=used*t.p;
    prev=t.l;
  }
  const s=r.sb+m3*r.sr;
  return{water:Math.round(w),sewer:Math.round(s),total:Math.round(w+s)};
}

function calcElec(plan,kwh){
  let cost=plan.base+plan.meter*3,rem=kwh,prev=0;
  for(const t of plan.tiers){
    if(rem<=0)break;
    const size=t.lim===Infinity?rem:t.lim-prev;
    const used=Math.min(rem,size);
    cost+=used*t.p;
    rem-=used;prev=t.lim;
  }
  return Math.round(cost);
}

function sortedPlans(region,kwh){
  const plans=ELECTRIC_PLANS[region]||ELECTRIC_PLANS.kanto;
  return [...plans].sort((a,b)=>calcElec(a,kwh)-calcElec(b,kwh)).slice(0,3);
}

}

// ============================================================
// Gemini API呼び出し（無料枠・有料化防止）
// ============================================================
async function callGemini(apiKey,prompt){
  if(!canUseAPI(apiKey)){
    return null; // 上限到達 → null返却
  }
  try{
    incrementApiUsage();
    const res=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`,
      {method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
         generationConfig:{maxOutputTokens:400,temperature:0.7}})}
    );
    const d=await res.json();
    if(d.error){
      if(d.error.code===429)return "⚠️ API使用量が一時的な上限に達しました。しばらく待ってから再試行してください。";
      if(d.error.code===400)return "⚠️ APIキーが無効です。設定を確認してください。";
      return `⚠️ エラー: ${d.error.message}`;
    }
    return d.candidates?.[0]?.content?.parts?.[0]?.text||"（応答なし）";
  }catch(e){
    return "（通信エラー：ローカルデータで表示中）";
  }
}

  const[selPlan,setSelPlan]=useState(null);
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("gemini_api_key")||"");
  const[showKeyInput,setShowKeyInput]=useState(false);
  const[aiText,setAiText]=useState("");
  const[aiLoading,setAiLoading]=useState(false);
  const[apiUsed,setApiUsed]=useState(getApiUsageToday);
  const ddRef=useRef();

  const filtered=search.length>=1
    ?CITIES.filter(c=>c.name.includes(search)||c.pref.includes(search)).slice(0,10)
    :[];

  function selectCity(c){setCity(c);setSearch(c.name);setShowDD(false);setAiText("");setSelPlan(null);}

  useEffect(()=>{
    function handler(e){if(ddRef.current&&!ddRef.current.contains(e.target))setShowDD(false);}
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  function saveKey(k){
    localStorage.setItem("gemini_api_key",k);
    setApiKey(k);
    setShowKeyInput(false);
  }

  async function getAiComment(){
    if(!city)return;
    const info=CITY_INFO_DB[city.id]||CITY_INFO_DB._default;
    setAiLoading(true);setAiText("");
    const prompt=`「${city.name}（${city.pref}）」の生活環境を以下のデータを踏まえ、200字以内で移住・生活者視点から簡潔にまとめてください。利便性${info.conv}点、治安${info.safe}点、物価水準指数${info.price}（全国平均100）、気候：${info.climate}、平均年収${info.salary}万円、生活保護承認率${info.welfare}%。良い点・注意点を含めてください。`;
    const result=await callGemini(apiKey,prompt);
    setApiUsed(getApiUsageToday());
    if(result===null){setAiText("⚠️ 本日のAI利用上限（"+GEMINI_DAILY_LIMIT+"回）に達しました。明日リセットされます。");}
    else{setAiText(result);}
    setAiLoading(false);
  }

  const waterBill=city?calcWater(city.id,waterM3):null;
  const info=city?(CITY_INFO_DB[city.id]||CITY_INFO_DB._default):null;
  const rent=city?(RENT_DB[city.id]||RENT_DB._default):null;
  const plans=city?sortedPlans(city.region,kwh):[];
  const props=city?genProps(city.id,layout):[];
  const planBills=plans.map(p=>({plan:p,bill:calcElec(p,kwh)}));

  return(
    <div style={{minHeight:"100vh",paddingBottom:60}}>
      {/* ヘッダー */}
      <div style={{background:"linear-gradient(135deg,#0f2027,#203a43,#2c5364)",padding:"22px 16px 16px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
        <div style={{fontSize:22,fontWeight:900,letterSpacing:1,color:"#fff"}}>🏙 生活費シミュレーター</div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.65)",marginTop:4}}>水道・電気・賃貸 全国比較（人口10万人以上）</div>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginTop:8,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:apiUsed>=GEMINI_DAILY_LIMIT?"#f87171":"#86efac",background:"rgba(0,0,0,0.3)",padding:"3px 10px",borderRadius:20}}>
            🤖 AI: {apiUsed}/{GEMINI_DAILY_LIMIT}回/日
          </span>
          <button onClick={()=>setShowKeyInput(!showKeyInput)} style={{fontSize:11,color:"#94a3b8",background:"rgba(255,255,255,0.1)",border:"none",borderRadius:20,padding:"3px 10px",cursor:"pointer"}}>
            {apiKey?"🔑 APIキー設定済":"⚙️ APIキー設定"}
          </button>
        </div>
      </div>

      {/* APIキー入力パネル */}
      {showKeyInput&&(
        <div style={{background:"rgba(15,23,42,0.95)",borderBottom:"1px solid rgba(99,102,241,0.3)",padding:"14px 16px"}}>
          <div style={{fontSize:13,color:"#c7d2fe",marginBottom:8,fontWeight:700}}>🔑 Gemini APIキー設定（任意）</div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:10,lineHeight:1.7}}>
            Google AI Studio（<span style={{color:"#38bdf8"}}>aistudio.google.com</span>）で無料取得できます。<br/>
            無料枠：1,500リクエスト/日（クレカ不要）<br/>
            本アプリは1日{GEMINI_DAILY_LIMIT}回まで使用し、超過時は自動停止します。<br/>
            ※未設定でもすべての機能（AI以外）は使用可能です。
          </div>
          <ApiKeyInput current={apiKey} onSave={saveKey} onCancel={()=>setShowKeyInput(false)}/>
        </div>
      )}

      <div style={{maxWidth:640,margin:"0 auto",padding:"16px 12px 0"}}>
        {/* 都市検索 */}
        <div ref={ddRef} style={{position:"relative",marginBottom:14}}>
          <input
            value={search}
            onChange={e=>{setSearch(e.target.value);setShowDD(true);}}
            onFocus={()=>setShowDD(true)}
            placeholder="🔍 都市名・都道府県名で検索（例：静岡、福岡）"
            style={{width:"100%",padding:"13px 16px",borderRadius:12,
              background:"rgba(255,255,255,0.08)",border:"1.5px solid rgba(99,102,241,0.45)",
              color:"#fff",fontSize:15,outline:"none",boxSizing:"border-box"}}
          />
          {showDD&&filtered.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:200,
              background:"#1e293b",border:"1px solid rgba(99,102,241,0.35)",
              borderRadius:12,marginTop:4,maxHeight:240,overflowY:"auto",
              boxShadow:"0 12px 40px rgba(0,0,0,0.6)"}}>
              {filtered.map(c=>(
                <div key={c.id} onClick={()=>selectCity(c)}
                  style={{padding:"11px 16px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.06)",
                    display:"flex",justifyContent:"space-between",alignItems:"center"}}
                  onTouchStart={e=>e.currentTarget.style.background="rgba(99,102,241,0.25)"}
                  onTouchEnd={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{fontWeight:600}}>{c.name}</span>
                  <span style={{fontSize:11,color:"#64748b"}}>{c.pref} / {c.pop}万人</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {!city&&(
          <div style={{textAlign:"center",padding:"50px 0",color:"#475569"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗾</div>
            <div style={{fontSize:14}}>都市を検索・選択してください</div>
            <div style={{fontSize:12,marginTop:6,color:"#334155"}}>人口10万人以上の全国{CITIES.length}都市に対応</div>
          </div>
        )}

        {city&&(
          <>
            {/* 都市バナー */}
            <Card style={{background:"linear-gradient(135deg,rgba(14,165,233,0.12),rgba(99,102,241,0.12))",borderColor:"rgba(99,102,241,0.3)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontSize:20,fontWeight:900}}>{city.name}</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{city.pref} ｜ 人口約{city.pop}万人</div>
                </div>
                <button onClick={getAiComment} disabled={aiLoading||!canUseAPI(apiKey)}
                  style={{background:canUseAPI(apiKey)?"linear-gradient(90deg,#6366f1,#0ea5e9)":"rgba(255,255,255,0.1)",
                    color:"#fff",border:"none",borderRadius:10,padding:"9px 14px",
                    fontSize:12,fontWeight:700,cursor:canUseAPI(apiKey)?"pointer":"default",
                    opacity:!apiKey?0.5:1,whiteSpace:"nowrap"}}>
                  {aiLoading?"分析中…":"✨ AI概要"}
                </button>
              </div>
              {!apiKey&&<div style={{fontSize:11,color:"#64748b",marginTop:8}}>※AI概要にはAPIキー設定が必要です（右上⚙️から無料設定）</div>}
              {aiText&&(
                <div style={{marginTop:12,padding:"10px 12px",background:"rgba(99,102,241,0.1)",borderRadius:10,fontSize:13,lineHeight:1.8,color:"#c7d2fe"}}>
                  🤖 {aiText}
                </div>
              )}
            </Card>

            {/* タブ */}
            <div style={{display:"flex",gap:6,marginBottom:14}}>
              <TabBtn label="💧水道" active={tab==="water"} onClick={()=>setTab("water")}/>
              <TabBtn label="⚡電気" active={tab==="electric"} onClick={()=>setTab("electric")}/>
              <TabBtn label="🏠賃貸" active={tab==="rent"} onClick={()=>setTab("rent")}/>
              <TabBtn label="📊地域" active={tab==="info"} onClick={()=>setTab("info")}/>
            </div>

            {/* ── 水道タブ ── */}
            {tab==="water"&&(
              <Card key="water">
                <div style={{fontWeight:700,fontSize:15,color:"#38bdf8",marginBottom:14}}>💧 上下水道料金シミュレーション</div>
                <label style={{fontSize:13,color:"#94a3b8"}}>月間使用量：<span style={{color:"#38bdf8",fontWeight:700}}>{waterM3} ㎥</span></label>
                <input type="range" min={1} max={50} value={waterM3} onChange={e=>setWaterM3(+e.target.value)}

                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#475569",marginBottom:14}}>
                  <span>1㎥（超節水）</span><span>25㎥（4人家族目安）</span><span>50㎥（大家族）</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                  {[["上水道",waterBill.water,"#38bdf8"],["下水道",waterBill.sewer,"#818cf8"],["合計",waterBill.total,"#f59e0b"]].map(([l,v,c])=>(
                    <div key={l} style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
                      <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{l}</div>
                      <div style={{fontSize:20,fontWeight:900,color:c}}>{v?.toLocaleString()}<span style={{fontSize:10}}>円</span></div>
                    </div>
                  ))}
                </div>
                {/* 複数使用量のシミュレーション表 */}
                <div style={{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:8}}>使用量別 料金一覧</div>
                {[5,10,15,20,25,30,40,50].map(m=>{
                  const b=calcWater(city.id,m);
                  return(
                    <div key={m} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",
                      borderBottom:"1px solid rgba(255,255,255,0.06)",fontSize:13,
                      fontWeight:m===waterM3?700:400,color:m===waterM3?"#38bdf8":"#e2e8f0"}}>
                      <span>{m}㎥/月</span>
                      <span>上水 {b.water.toLocaleString()}円 ／ 下水 {b.sewer.toLocaleString()}円 ／ <span style={{color:"#f59e0b"}}>計 {b.total.toLocaleString()}円</span></span>
                    </div>
                  );
                })}
                <div style={{fontSize:11,color:"#475569",marginTop:10,lineHeight:1.7}}>
                  ※目安：1人暮らし8〜10㎥、2人15〜20㎥、4人25〜35㎥<br/>
                  ※実際の料金は各自治体公式サイトでご確認ください（概算値）
                </div>
              </Card>
            )}

            {/* ── 電気タブ ── */}
            {tab==="electric"&&(
              <Card key="elec">
                <div style={{fontWeight:700,fontSize:15,color:"#fbbf24",marginBottom:14}}>⚡ 電気料金プラン比較</div>
                <label style={{fontSize:13,color:"#94a3b8"}}>月間使用量：<span style={{color:"#fbbf24",fontWeight:700}}>{kwh} kWh</span></label>
                <input type="range" min={50} max={700} step={10} value={kwh} onChange={e=>{setKwh(+e.target.value);setSelPlan(null);}}
                  style={{marginTop:8,marginBottom:2}}/>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#475569",marginBottom:14}}>
                  <span>50kWh</span><span>200kWh（1人）</span><span>400kWh（4人）</span><span>700kWh</span>
                </div>
                <div style={{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:10}}>💡 安い順 上位3プラン（{kwh}kWh/月）</div>
                {planBills.map(({plan,bill},i)=>{
                  const isSel=selPlan===plan;
                  return(
                    <div key={i} onClick={()=>setSelPlan(isSel?null:plan)}
                      style={{background:isSel?"rgba(99,102,241,0.15)":"rgba(255,255,255,0.04)",
                        border:`1.5px solid ${isSel?"#6366f1":"rgba(255,255,255,0.09)"}`,
                        borderRadius:12,padding:"13px 14px",marginBottom:10,cursor:"pointer",transition:"all 0.2s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                            <span style={{background:i===0?"#f59e0b":i===1?"#6b7280":"#78350f",
                              color:"#fff",borderRadius:6,padding:"1px 8px",fontSize:11,fontWeight:700,flexShrink:0}}>
                              {i+1}位
                            </span>
                            <span style={{fontWeight:700,fontSize:13}}>{plan.company}</span>
                          </div>
                          <div style={{fontSize:12,color:"#94a3b8"}}>{plan.plan}</div>
                          {plan.note&&<div style={{fontSize:11,color:"#34d399",marginTop:3}}>✓ {plan.note}</div>}
                          {plan.cashback&&(
                            <div style={{fontSize:11,color:"#fcd34d",marginTop:3,background:"rgba(251,191,36,0.1)",borderRadius:6,padding:"3px 6px"}}>
                              🎁 参考：{plan.cashback}
                            </div>
                          )}
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:22,fontWeight:900,color:"#fbbf24"}}>{bill.toLocaleString()}<span style={{fontSize:11}}>円/月</span></div>
                          <div style={{fontSize:10,color:"#475569"}}>基本料{plan.base}円</div>
                        </div>
                      </div>
                      {isSel&&(
                        <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.1)"}}>
                          <div style={{fontSize:12,fontWeight:700,color:"#c7d2fe",marginBottom:8}}>📊 使用量別シミュレーション</div>
                          {[100,150,200,300,400,500,600].map(k=>(
                            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",
                              borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:13,
                              fontWeight:k===kwh?700:400,color:k===kwh?"#fbbf24":"#e2e8f0"}}>
                              <span>{k} kWh/月</span>
                              <span>{calcElec(plan,k).toLocaleString()} 円</span>
                            </div>
                          ))}
                          <div style={{fontSize:11,color:"#475569",marginTop:8,lineHeight:1.7}}>
                            ※キャッシュバック・割引を除く通常料金体系のみ<br/>
                            ※実際の申込・料金は各社公式サイトでご確認ください
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                <div style={{fontSize:11,color:"#475569",lineHeight:1.7}}>
                  ※概算値。燃料費調整額・再エネ賦課金は別途加算されます
                </div>
              </Card>
            )}

            {/* ── 賃貸タブ ── */}
            {tab==="rent"&&(
              <Card key="rent">
                <div style={{fontWeight:700,fontSize:15,color:"#34d399",marginBottom:14}}>🏠 賃貸相場・物件情報</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
                  {LAYOUTS.map(l=>(
                    <button key={l} onClick={()=>setLayout(l)}
                      style={{padding:"7px 14px",borderRadius:8,border:"none",fontWeight:700,cursor:"pointer",fontSize:13,
                        background:layout===l?"linear-gradient(90deg,#34d399,#0ea5e9)":"rgba(255,255,255,0.07)",
                        color:layout===l?"#fff":"#94a3b8"}}>
                      {l}
                    </button>
                  ))}
                </div>
                {/* 相場一覧 */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:16}}>
                  {LAYOUTS.map(l=>(
                    <div key={l} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 8px",
                      textAlign:"center",border:`1px solid ${l===layout?"rgba(52,211,153,0.5)":"rgba(255,255,255,0.08)"}`}}>
                      <div style={{fontSize:11,color:"#64748b"}}>{l}</div>
                      <div style={{fontWeight:800,color:l===layout?"#34d399":"#e2e8f0",fontSize:15,marginTop:2}}>
                        {((rent[l]||0)/10000).toFixed(1)}<span style={{fontSize:10}}>万円</span>
                      </div>
                    </div>
                  ))}
                </div>
                {/* 物件例 */}
                <div style={{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:10}}>🏘 参考物件例（{layout}・安い順3件）</div>
                {props.map((p,i)=>(
                  <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",
                    borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                      <div>
                        <span style={{background:["#f59e0b","#6366f1","#475569"][i],color:"#fff",borderRadius:6,
                          padding:"1px 8px",fontSize:11,fontWeight:700,marginRight:6}}>{i+1}番目</span>
                        <span style={{fontWeight:700,fontSize:13}}>{p.label}</span>
                      </div>
                      <div style={{fontWeight:900,fontSize:19,color:"#34d399"}}>{(p.rent/10000).toFixed(1)}<span style={{fontSize:11}}>万円/月</span></div>
                    </div>
                    <div style={{fontSize:12,color:"#64748b",marginTop:6}}>
                      📐{p.area}㎡ ｜ 🏗築{p.age}年 ｜ 🚶駅徒歩{p.walk}分
                    </div>
                  </div>
                ))}
                <div style={{fontSize:11,color:"#475569",lineHeight:1.7}}>
                  ※相場ベースの参考物件です。実際の物件はSUUMO・HOME'S等でご確認ください
                </div>
              </Card>
            )}

            {/* ── 地域情報タブ ── */}
            {tab==="info"&&info&&(
              <Card key="info">
                <div style={{fontWeight:700,fontSize:15,color:"#f472b6",marginBottom:16}}>📊 {city.name} 地域情報</div>
                <Meter label="🚃 利便性（交通・商業施設）" val={info.conv} color="#38bdf8"/>
                <Meter label="🛡 治安（犯罪率等から概算）" val={info.safe} color="#34d399"/>
                <Meter label="💴 物価水準（全国平均=100）" val={info.price} max={160} color="#f59e0b"/>
                <div style={{height:1,background:"rgba(255,255,255,0.08)",margin:"14px 0"}}/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"12px",textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>🌤 気候</div>
                    <div style={{fontWeight:700,fontSize:12,lineHeight:1.5}}>{info.climate}</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"12px",textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>💼 平均年収（概算）</div>
                    <div style={{fontWeight:900,fontSize:22,color:"#fbbf24"}}>{info.salary}<span style={{fontSize:11}}>万円</span></div>
                  </div>
                </div>
                {/* 生活保護承認率 */}
                <div style={{background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:12,padding:"14px"}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#f87171",marginBottom:8}}>📋 生活保護 申請承認率（概算）</div>
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    <div style={{fontSize:38,fontWeight:900,color:"#f87171",flexShrink:0}}>
                      {info.welfare}<span style={{fontSize:15}}>%</span>
                    </div>
                    <div>
                      <div style={{background:"rgba(255,255,255,0.08)",borderRadius:6,height:8,overflow:"hidden",marginBottom:6}}>
                        <div style={{width:`${info.welfare}%`,background:"linear-gradient(90deg,#f87171,#fb923c)",height:"100%",transition:"width 0.6s"}}/>
                      </div>
                      <div style={{fontSize:11,color:"#64748b",lineHeight:1.7}}>
                        ※厚生労働省統計・各自治体公表データに基づく概算値<br/>
                        実際の承認率は世帯状況・時期により異なります
                      </div>
                    </div>
                  </div>
                </div>
                <div style={{fontSize:11,color:"#334155",marginTop:10,lineHeight:1.6}}>
                  ※各指標は公開統計・調査データに基づく参考値です
                </div>
              </Card>
            )}
          </>
        )}

        {/* フッター */}
        <div style={{textAlign:"center",fontSize:11,color:"#334155",marginTop:20,lineHeight:2,padding:"0 4px"}}>
          本ツールはすべて完全無料で動作します。<br/>
          AI機能（Gemini API）: 無料枠1日{GEMINI_DAILY_LIMIT}回制限・超過時自動停止。有料課金は一切行いません。<br/>
          データは公開情報ベースの概算値です。正確な情報は各機関でご確認ください。
        </div>
      </div>
    </div>
  );
}

// APIキー入力コンポーネント（分離）
function ApiKeyInput({current,onSave,onCancel}){
  const[val,setVal]=React.useState(current||"");
  return(
    <div>
      <input value={val} onChange={e=>setVal(e.target.value)}
        placeholder="AIzaSy... （Google AI Studioで無料取得）"
        type="password"
        style={{width:"100%",padding:"10px 12px",borderRadius:10,boxSizing:"border-box",
          background:"rgba(255,255,255,0.07)",border:"1px solid rgba(99,102,241,0.4)",
          color:"#fff",fontSize:13,outline:"none",marginBottom:8}}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>onSave(val)}
          style={{flex:1,padding:"9px",background:"linear-gradient(90deg,#6366f1,#0ea5e9)",
            color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:13}}>
          保存
        </button>
        <button onClick={onCancel}
          style={{flex:1,padding:"9px",background:"rgba(255,255,255,0.07)",
            color:"#94a3b8",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:13}}>
          キャンセル
        </button>
        {current&&(
          <button onClick={()=>onSave("")}
            style={{padding:"9px 14px",background:"rgba(248,113,113,0.15)",
              color:"#f87171",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:13}}>
            削除
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
